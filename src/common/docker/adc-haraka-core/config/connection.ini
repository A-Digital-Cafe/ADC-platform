; Config de conexión de Haraka. Obligatoria desde Haraka 3.2: connection.js
; itera [haproxy]hosts al cargar y el proceso no arranca si la sección falta.
[haproxy]
; Sin proxies PROXY-protocol delante del MTA.
hosts[] =

[max]
; Tamaño máximo de mensaje (50 MB) — antes era `databytes` en smtp.ini, que
; Haraka >= 3.2 ya no lee. El límite real por tier lo aplica el email-service.
bytes=52428800
