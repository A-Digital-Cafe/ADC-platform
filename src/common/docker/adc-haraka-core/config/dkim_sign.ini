; Firmado DKIM saliente con selector global.
; La clave privada se monta en /app/config/dkim (ver docker-compose.yml).
; Estructura esperada:
;   config/dkim/<dominio>/private   (clave privada PEM)
;   config/dkim/<dominio>/selector  (contiene: adcmail)
;
; Genera el par: openssl genrsa -out dkim.private.pem 2048
;                openssl rsa -in dkim.private.pem -pubout -out dkim.public.pem
; Publica la pública en: adcmail._domainkey.tudominio.com TXT "v=DKIM1; k=rsa; p=<base64>"
; y también en:          *._domainkey.tudominio.com (wildcard multi-tenant)
disabled=false
selector=adcmail
