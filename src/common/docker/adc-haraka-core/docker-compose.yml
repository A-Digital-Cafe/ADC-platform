services:
  haraka:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adc-haraka-core
    ports:
      - "25:25"     # SMTP entrante
      - "587:587"   # Submission (envío autenticado desde email-service)
    environment:
      # Hostname público del MTA (debe coincidir con el registro A y el PTR)
      HARAKA_ME: ${MAIL_HOSTNAME:-mail.tudominio.com}
      # Dominio raíz de correo; se aceptan subdominios *.<MAIL_ROOT_DOMAIN>
      MAIL_ROOT_DOMAIN: ${MAIL_ROOT_DOMAIN:-tudominio.com}
      # Webhook del email-service para entregar correo entrante
      INBOUND_WEBHOOK_URL: ${MAIL_INBOUND_WEBHOOK_URL:-http://host.docker.internal:3000/api/email/inbound}
      INBOUND_WEBHOOK_SECRET: ${MAIL_INBOUND_WEBHOOK_SECRET:-change-me}
      # DKIM selector global
      DKIM_SELECTOR: ${MAIL_DKIM_SELECTOR:-adcmail}
    volumes:
      # Clave privada DKIM: openssl genrsa -out ./dkim/<dominio>/private 2048
      # La pública (openssl rsa -in private -pubout) va en el TXT: adcmail._domainkey.<dominio>
      - ./dkim:/app/config/dkim:ro
      - adc_haraka_queue:/app/queue
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - adc-network

volumes:
  adc_haraka_queue:

networks:
  adc-network:
    driver: bridge
