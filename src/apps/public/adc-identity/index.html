<!DOCTYPE html>
<html lang="es" crystal-theme>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Usuarios, roles y permisos de tu organización en ADC." />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1a202c" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Identity" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <title>Identity Management - ADC</title>
    <style>
        :root {
            --custom-tone-1: 200;
            --custom-tone-2: 220;
        }
    </style>
    <script>
        (function () {
            function getCookie(name) {
                var m = new RegExp("(^| )" + name + "=([^;]+)").exec(document.cookie);
                return m ? m[2] : null;
            }
            var saved = getCookie('theme') || localStorage.getItem('theme');
            var isDark = saved
                ? saved.includes('dark')
                : globalThis.matchMedia('(prefers-color-scheme: dark)').matches;
            if (isDark) {
                document.documentElement.setAttribute('dark-mode', '');
            } else {
                document.documentElement.removeAttribute('dark-mode');
            }
        })();
    </script>
</head>

<body>
    <div id="root"></div>
</body>

</html>
