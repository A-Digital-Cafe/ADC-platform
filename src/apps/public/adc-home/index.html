<!DOCTYPE html>
<html lang="es" crystal-theme>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Abby's Digital Cafe - Home</title>
  <meta name="description" content="Tu acceso a todas las apps de Abby's Digital Cafe." />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1a202c" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ADC Cafe" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <style>
    :root {
      --custom-tone-1: 70;
      --custom-tone-2: 50;
    }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
    }
  </style>
  <script>
    (function () {
      function getCookie(name) {
        var m = new RegExp("(^| )" + name + "=([^;]+)").exec(document.cookie);
        return m ? m[2] : null;
      }
      var saved = getCookie('theme') || localStorage.getItem('theme');
      var isDark = saved
        ? saved.includes('dark')
        : globalThis.matchMedia('(prefers-color-scheme: dark)').matches;
      if (isDark) {
        document.documentElement.setAttribute('dark-mode', '');
      } else {
        document.documentElement.removeAttribute('dark-mode');
      }
    })();
  </script>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
    }
  </style>
</head>

<body>
  <div id="root"></div>
</body>

</html>
